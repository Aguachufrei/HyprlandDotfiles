# ~/.config/kitty/kitty.conf

# Font settings
font_family Hack Nerd Font
bold_font Hack Nerd Font
italic_font Hack Nerd Font
bold_italic_font Hack Nerd Font
font_size 10.0

# Line/character spacing (optional)
adjust_line_height 110%
adjust_column_width 102%

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Window appearance
background_opacity 0.95
enable_audio_bell no
hide_window_decorations no

# Colors (Tokyo Night style)
foreground   #c0caf5
background   #1a1b26
selection_foreground #1a1b26
selection_background #c0caf5

# Black, Red, Green, Yellow, Blue, Magenta, Cyan, White
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Scrollback
scrollback_lines 5000

# Keybinding (optional)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

