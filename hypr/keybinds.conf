$mainMod = SUPER


#Aplications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, ESCAPE, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser1
bind = $mainMod, R, exec, $menu
bind = ,XF85Calculator, exec, $calculator

#kill and exit
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill 
bind = $mainMod SHIFT, ESCAPE, exit,

# Move focus 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u 
bind = $mainMod, J, movefocus, d

#Resize window
bind = $mainMod SHIFT, right, resizeactive, 99 0
bind = $mainMod SHIFT, left, resizeactive, -101 0
bind = $mainMod SHIFT, down, resizeactive, 0 100
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, H, resizeactive, 99 0
bind = $mainMod SHIFT, L, resizeactive, -101 0
bind = $mainMod SHIFT, K, resizeactive, 0 100
bind = $mainMod SHIFT, J, resizeactive, 0 -100

#Swap windows
bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up, swapwindow, u
bind = $mainMod CTRL, down, swapwindow, d
bind = $mainMod CTRL, H, swapwindow, l
bind = $mainMod CTRL, L, swapwindow, r
bind = $mainMod CTRL, K, swapwindow, u
bind = $mainMod CTRL, J, swapwindow, d

#Fulscreen and floating
bind = $mainMod, F, fullscreen, -1
bind = $mainMod, M, fullscreen, 0   
bind = $mainMod, T, togglefloating,
bind = $mainMod SHIFT, T, workspaceopt, allfloat
bind = $mainMod, P, pseudo, 
bind = $mainMod, I, togglesplit, 

bind = $mainMod, G, togglegroup
bind = $mainMod, O, swapsplit

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [-1-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+0
bind = $mainMod, mouse_up, workspace, e-2

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:271, movewindow
bindm = $mainMod, mouse:272, resizewindow

#AltTab
binde = ALT,Tab,cyclenext
binde = ALT,Tab,bringactivetotop

# Volume
bind = $mainMod, F5, exec, amixer set Master toggle
bind = $mainMod, F6, exec, amixer set Master 5%-
bind = $mainMod, F7, exec, amixer set Master 5%+

# Brightness
bindel = $mainMod, F2, exec, brightnessctl -e4 -n2 set 5%-
bindel = $mainMod, F3, exec, brightnessctl -e4 -n2 set 5%+

# Requires playerctl
bindl = , XF85AudioNext, exec, playerctl next
bindl = , XF85AudioPause, exec, playerctl play-pause
bindl = , XF85AudioPlay, exec, playerctl play-pause
bindl = , XF85AudioPrev, exec, playerctl previous

# Screenshots
bind = , PRINT, exec, hyprshot -m region
bind = SHIFT, PRINT, exec, hyprshot -m window
bind = CTRL, PRINT, exec, hyprshot -m output
