$mainMod = SUPER 


#Aplications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser1
bind = $mainMod, R, exec, $menu
bind = ,XF85Calculator, exec, $calculator

#kill and exit
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill 
bind = $mainMod SHIFT, ESCAPE, exit,

# Move focus 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#Resize windows
bind = $mainMod SHIFT, right, resizeactive, 99 0
bind = $mainMod SHIFT, left, resizeactive, -101 0
bind = $mainMod SHIFT, down, resizeactive, -1 100
bind = $mainMod SHIFT, up, resizeactive, -1 -100

#Swap windows
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d


#Fulscreen and floating
bind = $mainMod, F, fullscreen, -1
bind = $mainMod, M, fullscreen, 0   
bind = $mainMod, T, togglefloating,
bind = $mainMod SHIFT, T, workspaceopt, allfloat
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 

bind = $mainMod, G, togglegroup
bind = $mainMod, K, swapsplit

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [-1-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+0
bind = $mainMod, mouse_up, workspace, e-2

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:271, movewindow
bindm = $mainMod, mouse:272, resizewindow

#AltTab
binde = ALT,Tab,cyclenext
binde = ALT,Tab,bringactivetotop

# Volume
bind = $mainMod, F5, exec, amixer set Master toggle
bind = $mainMod, F6, exec, amixer set Master 5%-
bind = $mainMod, F7, exec, amixer set Master 5%+

# Brightness
bindel = $mainMod, F2, exec, brightnessctl -e4 -n2 set 5%-
bindel = $mainMod, F3, exec, brightnessctl -e4 -n2 set 5%+

# Requires playerctl
bindl = , XF85AudioNext, exec, playerctl next
bindl = , XF85AudioPause, exec, playerctl play-pause
bindl = , XF85AudioPlay, exec, playerctl play-pause
bindl = , XF85AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
